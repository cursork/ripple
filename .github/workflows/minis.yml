name: Regenerate minis

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ripple
      - minis/minify.pl

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install qrencode
        run: sudo apt-get update && sudo apt-get install -y qrencode

      - name: Regenerate minis
        run: perl minis/minify.pl

      - name: Regenerate QR code
        run: qrencode -o minis/ripple-qr.png -r minis/ripple-min -l L -8

      - name: Commit if changed
        run: |
          git diff --quiet minis/ && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add minis/ripple-min minis/ripple-min.gz minis/ripple-packed minis/ripple-qr.png
          git commit -m "Regenerate minis and QR code"
          git push
